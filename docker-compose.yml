services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devuser -d app"]
      interval: 2s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://backend:3001
    depends_on:
      - backend

  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["node", "dist/db/migrate.js"]
    environment:
      - DATABASE_URL=postgresql://devuser:devpass@postgres:5432/app
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - FASTIFY_PORT=3001
      - FASTIFY_ADDRESS=0.0.0.0
      - DATABASE_URL=postgresql://devuser:devpass@postgres:5432/app
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
