name: Deploy Staging

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git SHA to deploy"
        required: false

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy-backend:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/_deploy_backend.yml
    with:
      environment: staging
      ref: ${{ inputs.ref || github.event.workflow_run.head_sha }}
    secrets: inherit

  deploy-frontend:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/_deploy_frontend.yml
    with:
      environment: staging
      ref: ${{ inputs.ref || github.event.workflow_run.head_sha }}
    secrets: inherit
