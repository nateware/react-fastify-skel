name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      TURBO_TELEMETRY_DISABLED: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      # Lockfile generated on macOS lacks linux platform binaries
      # for native deps (lightningcss, rollup, etc). Remove it so
      # npm resolves the correct binaries for this runner.
      # See: https://github.com/npm/cli/issues/4828
      - run: rm package-lock.json && npm install

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
